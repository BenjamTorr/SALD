config_21:
  lora_dims:
    attn_proj:   { r: 8, alpha: 2 }
    output_proj: { r: 8, alpha: 2 }
    proj_out:    { r: 32, alpha: 16}
    mlp_block:   { r: 8, alpha: 2 }
    adaln:       { r: 8, alpha: 2 }
  lambd: 1.2
  weight_decay: 0.0
  denoising_steps: 50
  K: 5 # number of steps in the DDIM to track gradients from
  batch_size: 16
  accumulation_steps: 4
  include_diff_loss: true # include regularzation
  use_fc20_as_target: true # whether to predict R(X_high)
  L1: false #wheter to use l1 loss
  LV: true #low variance option, repeat lasst denoising step -> predict several times
  n_rep: 4
  m: 1 # number of matrices to sample, predict and then average results before comparing
  lr: 0.0004
  include_mlp: true
  include_ln: true
  use_scheduler: false

